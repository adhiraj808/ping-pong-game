<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏓 Ultimate Pong</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Main Menu -->
        <div id="menu-overlay" class="overlay active">
            <h1>ULTIMATE PONG</h1>
            <div class="menu-buttons">
                <button id="btn-single">Single Player (VS AI)</button>
                <div class="divider"><span>OR</span></div>
                <button id="btn-host">Host Multiplayer</button>
                <div class="join-container">
                    <input type="text" id="join-id" placeholder="Enter Room ID">
                    <button id="btn-join">Join Game</button>
                </div>
            </div>
        </div>

        <!-- Room Info Overlay -->
        <div id="room-overlay" class="overlay hidden">
            <h2>WAITING FOR OPPONENT</h2>
            <p>Room ID: <span id="display-room-id">....</span></p>
            <div class="loader"></div>
        </div>

        <!-- Game Canvas -->
        <canvas id="gameCanvas"></canvas>

        <!-- Pause / UI Layer -->
        <div id="game-ui" class="hidden">
            <button id="btn-pause">Pause</button>
        </div>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
